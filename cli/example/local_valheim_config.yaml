# Example: run a Valheim server on the local machine with mods.
#
# Usage:
#   openhost up example/local_valheim_config.yaml
#
# The local provider writes the runner config to ~/.openhost/local/<name>/
# and invokes the runner binary with debug.local_mode enabled.
#
# Prerequisites:
#   - The openhost-runner binary must be on $PATH or specified via
#     provider.settings.runner_bin
#   - SteamCMD must be installed (the runner handles this unless in local_mode)

server:
  name: "local-valheim"

provider:
  name: local
  settings:
    # work_dir: "/tmp/openhost-valheim"     # optional: override work directory
    runner_bin: "../runner/openhost-runner" # optional: path to runner binary
    # skip_server_start: false              # optional: skip starting the server

game:
  name: valheim
  settings:
    world: "LocalWorld"
    password: "secret"
    # thunderstore_code: "YOUR_CODE"        # optional: import Thunderstore modpack

