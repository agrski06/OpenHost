name: Tag Runner

on:
  push:
    branches: [master]
    paths:
      - 'runner/**'
      - 'pkg/runnerconfig/**'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          # Find the latest runner-v* tag sorted by version.
          LATEST=$(git tag --list 'runner-v*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            VER="${LATEST#runner-v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

            # Check commit message for bump hints:
            #   [major] → bump major, reset minor+patch
            #   [minor] → bump minor, reset patch
            #   otherwise → bump patch
            MSG=$(git log -1 --format=%s)
            if echo "$MSG" | grep -qi '\[major\]'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$MSG" | grep -qi '\[minor\]'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi

          TAG="runner-v${NEXT}"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Auto-computed next runner tag: ${TAG}"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Runner release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

