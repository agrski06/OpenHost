name: Release Runner

on:
  push:
    branches: [master]
    paths:
      - 'runner/**'
      - 'pkg/runnerconfig/**'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'runner-v*' --sort=-version:refname | head -n1)

          if [ -z "$LATEST" ]; then
            NEXT="0.1.0"
          else
            VER="${LATEST#runner-v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"

            MSG=$(git log -1 --format=%s)
            if echo "$MSG" | grep -qi '\[major\]'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$MSG" | grep -qi '\[minor\]'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi

            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=runner-v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}" -m "Runner release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod

      - name: Build runner binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd runner
          go build -o ../openhost-runner-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openhost-runner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: openhost-runner-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: artifacts/**/*
          generate_release_notes: true

