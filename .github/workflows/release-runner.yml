name: Release Runner

on:
  push:
    tags:
      - 'runner-v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
      - name: Build runner
        run: |
          VERSION="${GITHUB_REF_NAME#runner-v}"
          cd runner
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION}" -o ../openhost-runner-${{ matrix.goos }}-${{ matrix.goarch }} .
      - name: Generate checksums
        run: sha256sum openhost-runner-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            openhost-runner-*
            checksums.txt


