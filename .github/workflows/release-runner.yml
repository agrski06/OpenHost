name: Release Runner

on:
  push:
    tags:
      - 'runner-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: runner/go.mod
      - name: Build runner
        run: |
          VERSION="${GITHUB_REF_NAME#runner-v}"
          cd runner
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" -o ../openhost-runner-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" -o ../openhost-runner-linux-arm64 .
      - name: Generate checksums
        run: sha256sum openhost-runner-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            openhost-runner-*
            checksums.txt


